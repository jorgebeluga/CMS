<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beluga Linguistics | Global Content Strategy</title>
  <meta name="description" content="Premium localization and translation technology for global brands.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1C0445;
      --secondary: #FFFFFF;
      --accent: #FFD100;
      --muted: #F2F0EF;
      --font-h: 'Libre Baskerville', serif;
      --font-b: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-b); background: var(--primary); color: #fff; line-height: 1.6; overflow-x: hidden; }
    
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: radial-gradient(circle at 70% 30%, rgba(255, 209, 0, 0.05) 0%, transparent 50%),
                  radial-gradient(circle at 10% 80%, rgba(12, 111, 249, 0.05) 0%, transparent 50%);
    }

    .logo { margin-bottom: 2rem; }
    .logo svg { width: 80px; height: auto; }

    h1 {
      font-family: var(--font-h);
      font-size: clamp(2.5rem, 8vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1.5rem;
      max-width: 900px;
    }

    p {
      font-size: 1.25rem;
      color: rgba(255,255,255,0.7);
      max-width: 600px;
      margin-bottom: 3rem;
    }

    .cta-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 16px 36px;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s ease;
      font-size: 1rem;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--primary);
    }
    .btn-primary:hover {
      background: #e8be00;
      transform: translateY(-2px);
    }

    .btn-outline {
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }
    .btn-outline:hover {
      background: rgba(255,255,255,0.05);
      border-color: #fff;
    }

    .floating-text {
      position: absolute;
      bottom: 2rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 616 635">
        <path fill="#FFD100" d="M 596.00 624.50 L 528.00 624.50 L 519.00 620.50 L 510.50 611.00 L 306.00 172.50 L 303.50 175.00 L 102.50 609.00 L 93.00 620.50 L 84.00 624.50 L 19.00 624.50 L 14.00 622.50 L 10.50 618.00 L 10.50 608.00 L 17.50 590.00 L 271.50 55.00 L 288.50 22.00 L 300.00 10.50 L 311.00 9.50 L 315.00 11.50 L 324.50 22.00 L 333.50 38.00 L 348.50 72.00 L 601.50 598.00 L 605.50 610.00 L 605.50 617.00 L 601.00 622.50 L 596.00 624.50 Z"/>
        <path fill="#FFD100" d="M 308.00 537.50 L 303.00 536.50 L 297.50 531.00 L 249.50 453.00 L 243.50 442.00 L 243.50 435.00 L 245.00 433.50 L 367.00 432.50 L 369.50 434.00 L 370.50 441.00 L 366.50 449.00 L 320.50 524.00 L 314.50 533.00 L 308.00 537.50 Z"/>
      </svg>
    </div>
    <h1>Global Content,<br>Locally Crafted.</h1>
    <p>We help world-class companies navigate the complexities of localization with technology and expertise.</p>
    
    <div class="cta-group">
      <a href="blog/" class="btn btn-primary">Read the Blog</a>
      <a href="#" class="btn btn-outline">Explore Services</a>
    </div>

    <div class="floating-text">© 2025 Beluga Linguistics</div>
  </section>

</body>
</html>
