<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Loading...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --primary: #1C0445; --secondary: #fff; --accent: #FFD100;
      --muted: #F2F0EF; --surface: #FCFCFC; --info: #0C6FF9;
      --font-h: 'Libre Baskerville', serif; --font-b: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-b); background: var(--surface); color: var(--primary); line-height: 1.8; }
    .nav { background: var(--primary); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 68px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { display: flex; align-items: center; gap: 10px; color: #fff; font-family: var(--font-h); font-weight: 700; text-decoration: none; }
    .nav-logo svg { width: 32px; height: 33px; }

    .post-header { background: var(--primary); color: #fff; padding: 6rem 2rem 4rem; text-align: center; }
    .post-header-inner { max-width: 800px; margin: 0 auto; }
    .post-cat { color: var(--accent); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 1rem; display: block; }
    .post-header h1 { font-family: var(--font-h); font-size: clamp(2rem, 5vw, 3.5rem); line-height: 1.1; margin-bottom: 1.5rem; }
    .post-meta { display: flex; justify-content: center; gap: 20px; font-size: 0.9rem; color: rgba(255,255,255,0.6); }

    .post-content { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; }
    .post-body { font-size: 1.1rem; }
    .post-body h2 { font-family: var(--font-h); margin: 2.5rem 0 1rem; font-size: 1.75rem; }
    .post-body p { margin-bottom: 1.5rem; }
    .post-body img { max-width: 100%; border-radius: 12px; margin: 2rem 0; }
    
    .tag-pill { background: var(--muted); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; text-decoration: none; margin-right: 5px; color: var(--primary); }
    .tag-pill:hover { background: var(--accent); }

    .back-blog { display: inline-block; margin-top: 3rem; font-weight: 700; color: var(--primary); text-decoration: none; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 616 635"><path fill="#FFD100" d="M 596.00 624.50 L 528.00 624.50 L 519.00 620.50 L 510.50 611.00 L 306.00 172.50 L 303.50 175.00 L 102.50 609.00 L 93.00 620.50 L 84.00 624.50 L 19.00 624.50 L 14.00 622.50 L 10.50 618.00 L 10.50 608.00 L 17.50 590.00 L 271.50 55.00 L 288.50 22.00 L 300.00 10.50 L 311.00 9.50 L 315.00 11.50 L 324.50 22.00 L 333.50 38.00 L 348.50 72.00 L 601.50 598.00 L 605.50 610.00 L 605.50 617.00 L 601.00 622.50 L 596.00 624.50 Z"/><path fill="#FFD100" d="M 308.00 537.50 L 303.00 536.50 L 297.50 531.00 L 249.50 453.00 L 243.50 442.00 L 243.50 435.00 L 245.00 433.50 L 367.00 432.50 L 369.50 434.00 L 370.50 441.00 L 366.50 449.00 L 320.50 524.00 L 314.50 533.00 L 308.00 537.50 Z"/></svg>
      <span>Beluga</span>
    </a>
  </nav>

  <article id="post-article">
    <div class="post-header">
      <div class="post-header-inner">
        <span class="post-cat" id="post-category">Category</span>
        <h1 id="post-title">Loading...</h1>
        <div class="post-meta">
          <span id="post-author">By Beluga</span>
          <span id="post-date"></span>
        </div>
      </div>
    </div>
    <div class="post-content">
      <div class="post-body" id="post-body"></div>
      <div id="post-tags" style="margin-top: 3rem;"></div>
      <a href="index.html" class="back-blog">← Back to Blog</a>
    </div>
  </article>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsvVPDLKP4ARheOl_yeyj9OcITIE5D9u1X9wtQlqCRrtm2YO-ti-dUrI5Xgxj22RtfwbTCQVp9qwyv/pub?gid=283028482&single=true&output=csv';
    const slug = new URLSearchParams(window.location.search).get('slug');

    function formatDate(s) {
      if (!s) return '';
      const d = new Date(s);
      return isNaN(d.getTime()) ? s : d.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
    }

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      complete: function(results) {
        const post = results.data.find(r => r.Record_Type === 'post_detail' && r.Slug === slug);
        if (post) {
          document.title = post.Title + ' — Beluga Blog';
          document.getElementById('post-title').textContent = post.Title;
          document.getElementById('post-category').textContent = post.Category;
          document.getElementById('post-author').textContent = 'By ' + post.Author;
          document.getElementById('post-date').textContent = formatDate(post.Date);
          
          const md = post.Markdown_Body || '';
          // Remove featured image from body if it's already used as hero (optional, here we just render all)
          document.getElementById('post-body').innerHTML = marked.parse(md);

          if (post.Tags) {
            const tags = post.Tags.split(',').map(t => t.trim());
            document.getElementById('post-tags').innerHTML = tags.map(t => 
              `<a href="tag.html?tag=${encodeURIComponent(t)}" class="tag-pill">#${t}</a>`
            ).join('');
          }
        } else {
          document.getElementById('post-title').textContent = 'Post not found';
        }
      }
    });
  </script>
</body>
</html>
