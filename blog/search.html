<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Beluga Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --primary: #1C0445; --secondary: #fff; --accent: #FFD100;
      --muted: #F2F0EF; --surface: #FCFCFC; --info: #0C6FF9;
      --font-h: 'Libre Baskerville', serif; --font-b: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-b); background: var(--surface); color: var(--primary); line-height: 1.7; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    
    .nav { background: var(--primary); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 68px; position: sticky; top: 0; z-index: 100; }
    .nav-logo { display: flex; align-items: center; gap: 10px; color: #fff; font-family: var(--font-h); font-weight: 700; }
    
    .search-hero { background: var(--primary); color: #fff; padding: 4rem 2rem; text-align: center; }
    .search-box { max-width: 600px; margin: 2rem auto 0; position: relative; }
    .search-input { width: 100%; padding: 15px 25px; border-radius: 30px; border: none; font-size: 1.1rem; outline: none; }

    .results-area { max-width: 1000px; margin: 0 auto; padding: 3rem 2rem; }
    .result-item { border-bottom: 1px solid var(--muted); padding: 2rem 0; }
    .result-item h2 { font-family: var(--font-h); font-size: 1.5rem; margin-bottom: 0.5rem; }
    .result-item p { color: #666; font-size: 0.95rem; }
    .result-link { color: var(--info); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; margin-top: 1rem; display: inline-block; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-logo">Beluga Blog</a>
  </nav>

  <header class="search-hero">
    <h1>Search results</h1>
    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Search insights...">
    </div>
  </header>

  <main class="results-area">
    <div id="resultsCount" style="margin-bottom: 2rem; font-weight: 700;"></div>
    <div id="resultsList"></div>
    <a href="index.html" style="display:block; margin-top:3rem; font-weight:700;">← Back to Blog</a>
  </main>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsvVPDLKP4ARheOl_yeyj9OcITIE5D9u1X9wtQlqCRrtm2YO-ti-dUrI5Xgxj22RtfwbTCQVp9qwyv/pub?gid=283028482&single=true&output=csv';
    const query = new URLSearchParams(window.location.search).get('q') || '';
    
    document.getElementById('searchInput').value = query;

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      complete: function(results) {
        const posts = results.data.filter(r => 
          r.Record_Type === 'post_detail' && (
            (r.Title || '').toLowerCase().includes(query.toLowerCase()) ||
            (r.Description || '').toLowerCase().includes(query.toLowerCase()) ||
            (r.Tags || '').toLowerCase().includes(query.toLowerCase())
          )
        );

        document.getElementById('resultsCount').textContent = posts.length + ' results for "' + query + '"';
        
        const list = document.getElementById('resultsList');
        list.innerHTML = posts.map(p => `
          <div class="result-item">
            <a href="post.html?slug=${p.Slug}"><h2>${p.Title}</h2></a>
            <p>${(p.Description || '').substring(0, 200)}...</p>
            <a href="post.html?slug=${p.Slug}" class="result-link">Read More →</a>
          </div>
        `).join('');
      }
    });

    document.getElementById('searchInput').onkeypress = function(e) {
      if (e.key === 'Enter') {
        window.location.href = 'search.html?q=' + encodeURIComponent(this.value);
      }
    };
  </script>
</body>
</html>
