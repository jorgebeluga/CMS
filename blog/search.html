<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Beluga Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root {
      --primary: #1C0445; --secondary: #fff; --accent: #FFD100;
      --muted: #F2F0EF; --surface: #FCFCFC; --info: #0C6FF9;
      --font-h: 'Libre Baskerville', serif; --font-b: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-b); background: var(--surface); color: var(--primary); line-height: 1.7; min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    .nav { background: var(--primary); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 68px; }
    .nav-logo { display: flex; align-items: center; gap: 10px; color: #fff; font-family: var(--font-h); font-weight: 700; }
    .nav-logo svg { width: 32px; height: 33px; }
    
    .hero { background: var(--primary); color: #fff; padding: 4rem 2rem; text-align: center; }
    .search-input { width: 100%; max-width: 600px; padding: 15px 25px; border-radius: 50px; border: none; font-size: 1.1rem; outline: none; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }

    .main { max-width: 900px; margin: 0 auto; padding: 3rem 2rem; }
    .result-item { padding: 2rem 0; border-bottom: 1px solid var(--muted); display: flex; gap: 2rem; }
    .result-content { flex: 1; }
    .result-img { width: 150px; height: 100px; border-radius: 12px; object-fit: cover; background: var(--muted); }
    .result-title { font-family: var(--font-h); font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--primary); }
    .result-title:hover { color: var(--info); }
    .result-excerpt { font-size: 0.95rem; color: #666; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

    .footer { background: var(--primary); color: rgba(255,255,255,0.5); text-align: center; padding: 3rem; margin-top: auto; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="./" class="nav-logo">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 616 635"><path fill="#FFD100" d="M 596.00 624.50 L 528.00 624.50 L 519.00 620.50 L 510.50 611.00 L 306.00 172.50 L 303.50 175.00 L 102.50 609.00 L 93.00 620.50 L 84.00 624.50 L 19.00 624.50 L 14.00 622.50 L 10.50 618.00 L 10.50 608.00 L 17.50 590.00 L 271.50 55.00 L 288.50 22.00 L 300.00 10.50 L 311.00 9.50 L 315.00 11.50 L 324.50 22.00 L 333.50 38.00 L 348.50 72.00 L 601.50 598.00 L 605.50 610.00 L 605.50 617.00 L 601.00 622.50 L 596.00 624.50 Z"/><path fill="#FFD100" d="M 308.00 537.50 L 303.00 536.50 L 297.50 531.00 L 249.50 453.00 L 243.50 442.00 L 243.50 435.00 L 245.00 433.50 L 367.00 432.50 L 369.50 434.00 L 370.50 441.00 L 366.50 449.00 L 320.50 524.00 L 314.50 533.00 L 308.00 537.50 Z"/></svg>
      <span>Beluga</span>
    </a>
  </nav>

  <header class="hero">
    <input type="text" id="searchInput" class="search-input" placeholder="Search insights..." oninput="doSearch()">
    <p id="search-status" style="margin-top:1.5rem; opacity:0.7"></p>
  </header>

  <main class="main" id="results"></main>

  <footer class="footer">
    <p>© 2025 Beluga Linguistics</p>
  </footer>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSsvVPDLKP4ARheOl_yeyj9OcITIE5D9u1X9wtQlqCRrtm2YO-ti-dUrI5Xgxj22RtfwbTCQVp9qwyv/pub?gid=283028482&single=true&output=csv';
    let allPosts = [];

    function doSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      if (!q) {
        document.getElementById('results').innerHTML = '';
        document.getElementById('search-status').textContent = '';
        return;
      }

      const results = allPosts.filter(p => 
        p.Title.toLowerCase().includes(q) || 
        p.Description.toLowerCase().includes(q) ||
        p.Tags.toLowerCase().includes(q)
      );

      document.getElementById('search-status').textContent = `Found ${results.length} results for "${q}"`;
      document.getElementById('results').innerHTML = results.map(p => `
        <div class="result-item">
          <div class="result-content">
            <div style="font-size:0.75rem; font-weight:700; color:var(--info); text-transform:uppercase; margin-bottom:0.5rem">${p.Category}</div>
            <a href="post.html?slug=${p.Slug}"><h2 class="result-title">${p.Title}</h2></a>
            <p class="result-excerpt">${p.Description.substring(0, 180)}...</p>
          </div>
          ${p.Image ? `<img src="${p.Image}" class="result-img">` : ''}
        </div>
      `).join('');
    }

    Papa.parse(CSV_URL, {
      download: true,
      header: true,
      complete: function(results) {
        allPosts = results.data.filter(r => r.Record_Type === 'post_detail');
        const initialQ = new URLSearchParams(window.location.search).get('q');
        if (initialQ) {
          document.getElementById('searchInput').value = initialQ;
          doSearch();
        }
      }
    });
  </script>
</body>
</html>
